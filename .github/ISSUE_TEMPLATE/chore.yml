name: Chore
description: 설정, 빌드, 도구 등 유지보수 작업
title: "chore(scope): "
labels:
  - ":wrench: Chore"
body:
  - type: markdown
    attributes:
      value: |
        Title은 영어 conventional commit 형식으로 작성해주세요.
        예: `chore(config): add cursor rules and pr template`
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - auth
        - dashboard
        - pdf
        - explanation
        - blank-study
        - ui
        - lib
        - deps
        - config
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 작업 내용 (1~3 bullets)
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 필요한지
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: "- [ ] 형식으로 작성"
      placeholder: |
        - [ ] Cursor rule 활성화 확인
        - [ ] GitHub PR template 자동 적용 확인
    validations:
      required: true
  - type: checkboxes
    id: extras
    attributes:
      label: Additional labels
      options:
        - label: good first issue
        - label: help wanted
