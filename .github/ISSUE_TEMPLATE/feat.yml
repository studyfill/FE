name: Feat
description: 새 기능 추가
title: "feat(scope): "
labels:
  - ":sparkles: Feat"
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Title은 영어 conventional commit 형식으로 작성해주세요.
        예: `feat(blank-study): implement answer checking`
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: 변경 범위 (feature 폴더 기준)
      options:
        - auth
        - dashboard
        - pdf
        - explanation
        - blank-study
        - ui
        - lib
        - deps
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 이 Issue가 해결할 일 (1~3 bullets)
      placeholder: "- 빈칸 학습 답안 체크 기능 구현"
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 필요한지
      placeholder: "- active recall 학습 플로우의 핵심 상호작용"
    validations:
      required: true
  - type: checkboxes
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: 완료 조건
      options:
        - label: 완료 조건을 아래에 작성했습니다
          required: true
  - type: textarea
    id: acceptance_details
    attributes:
      label: Acceptance criteria details
      description: "- [ ] 형식으로 작성"
      placeholder: |
        - [ ] 정답 제출 시 success 상태 표시
        - [ ] 오답 제출 시 retry 버튼 동작
    validations:
      required: true
  - type: checkboxes
    id: extras
    attributes:
      label: Additional labels
      options:
        - label: good first issue
        - label: help wanted
