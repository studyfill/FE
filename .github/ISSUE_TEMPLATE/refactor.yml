name: Refactor
description: 기능 변경 없는 코드 구조 개선
title: "refactor(scope): "
labels:
  - ":recycle: Refactor"
body:
  - type: markdown
    attributes:
      value: |
        Title은 영어 conventional commit 형식으로 작성해주세요.
        예: `refactor(pdf): separate workspace layout`
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - auth
        - dashboard
        - pdf
        - explanation
        - blank-study
        - ui
        - lib
        - deps
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 리팩터링 내용
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 필요한지
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: "- [ ] 형식으로 작성"
    validations:
      required: true
